# ============================================================
#  C.A.R.E Backend – Application Properties
# ============================================================

# ----- Server -----
server.port=8080

# ----- Application Name -----
spring.application.name=care-backend

# ============================================================
#  DATABASE CONFIGURATION
#  >> Replace the values below with your MySQL credentials <<
# ============================================================

# Your MySQL server URL
# Format: jdbc:mysql://HOST:PORT/DATABASE_NAME
# "createDatabaseIfNotExist=true" will auto-create the DB if it doesn't exist
spring.datasource.url=jdbc:mysql://localhost:3306/care_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Your MySQL username (default is usually "root")
spring.datasource.username=careuser

# Your MySQL password
spring.datasource.password=care123

# MySQL JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#  JPA / HIBERNATE SETTINGS
# ============================================================

# "update"  → Hibernate auto-creates/updates tables based on entities (good for dev)
# "create"  → Drops and recreates tables every restart (use only during setup)
# "validate"→ Only validates, never changes schema (good for production)
# "none"    → Does nothing (for manual schema management)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console (helpful during development)
spring.jpa.show-sql=true

# Pretty-print the SQL output
spring.jpa.properties.hibernate.format_sql=true

# Hibernate dialect for MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

